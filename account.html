<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradecrafters | Account</title>
    <link href="stylesheet/style.css" rel="stylesheet">
</head>
<body>
     <nav>
        <a class="logo" href="index.html">Tradecrafters</a>
        <ul>
            <li><a href="trades.html">Trades</a></li>
            <li><a href="findapro.html">Find a Pro</a></li>
            <li><a href="pros.html">PROS</a></li>
            <li><a href="howitworks.html">How it Works</a></li>
            <li><a href="account.html">Account</a></li>
            <li><a href="company.html">Company</a></li>
        </ul>
    </nav>
    <main>
        <header>
            <div class="brand">
                <h1>My Account</h1>
            </div>
        </header>
        <section class="auth">
            <div class="auth-forms">
                <div class="auth-column">
                    <h2>Sign In</h2>
                <form>
                    <fieldset>
                        <label for="login-email">Email:</label>
                        <input type="email" id="login-email" name="email" required>
                        <label for="login-password">Password:</label>
                        <input type="password" id="login-password" name="password" required>
                        <button type="submit">Sign In</button>
                    </fieldset>
                </form>
                </div>
                <div class="auth-column">
                    <h2>Sign Up</h2>
                    <form>   
                        <fieldset class="radio">
                            <legend>Account Type</legend>
                            <input type="radio" id="customer" name="account-type" value="customer" checked>
                            <label for="customer">Customer</label>
                            <input type="radio" id="pro" name="account-type" value="pro">
                            <label for="pro">Pro</label>
                        </fieldset>
                        <fieldset>
                            <label for="signup-name">First Name:</label>
                            <input type="text" id="signup-name" name="name" required>  
                            <label for="signup-last-name">Last Name:</label>
                            <input type="text" id="signup-last-name" name="last-name" required>
                            <label for="signup-email">Email:</label>
                            <input type="email" id="signup-email" name="email" required>
                            <label for="signup-password">Password:</label>
                            <input type="password" id="signup-password" name="password" required>
                            <label for="signup-confirm-password">Confirm Password:</label>
                            <input type="password" id="signup-confirm-password" name="confirm-password" required>
                            <button type="submit">Sign Up</button>
                        </fieldset>
                    </form>
                </div>
            </div>
            <div class="social">
            <p class="divider">or</p>
            <a class="btn" href="#google-sign-in">Continue with Google</a>
            <a class="btn" href="#apple-sign-in">Continue with Apple</a>
            </div>
        </section>
    </main>
    <footer>
        <ul>
            <li><a href="account.html">Account</a></li>
            <li><a href="company.html">Company</a></li>
        </ul>
         <p>&copy; 2026 Tradecrafters. All rights reserved.</p>
    </footer>
</body>
</html>
